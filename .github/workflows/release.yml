name: Release

# Dispara quando voce empurra uma tag no formato vX.Y.Z (ex: git push origin v1.3.0).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # necessario para criar o Release

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Deriva a versao da tag (v1.3.0 -> 1.3.0)
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Instala o Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Grava a versao da tag no pubspec.yaml
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          (Get-Content pubspec.yaml) -replace '^version:.*', "version: $v+${{ github.run_number }}" |
            Set-Content pubspec.yaml -Encoding utf8

      - name: Baixa dependencias
        run: flutter pub get

      - name: Compila o app (Windows release)
        run: flutter build windows --release

      - name: Instala o Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Gera o instalador
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.version.outputs.version }}" `
            "installer\fiado_mercadinho.iss"

      - name: Publica o Release com o instalador
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: installer/Output/FiadosMercadinho-Setup-${{ steps.version.outputs.version }}.exe
          generate_release_notes: true
